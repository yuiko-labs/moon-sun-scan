<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>魔女っ娘★月と太陽スキャン</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <img src="images/sun-moon-scan.png" alt="魔女っ娘★月と太陽スキャン" style="width:100%; max-width:1200px; display:block; margin:20px auto;">

  <main class="wrap">
    <section class="card">
      <h1>魔女っ娘★月と太陽スキャン</h1>
      <p class="lead">生年月日・出生時間・出生地から、月と太陽の配置をスキャンするよ✨</p>

      <form id="scan-form" class="form">
        <label>
          生年月日
          <div class="date-row">
            <input type="text" id="birth-year" inputmode="numeric" placeholder="年" maxlength="4" />
            <input type="text" id="birth-month" inputmode="numeric" placeholder="月" maxlength="2" />
            <input type="text" id="birth-day" inputmode="numeric" placeholder="日" maxlength="2" />
          </div>
        </label>

        <label>
          出生時間
          <input type="time" id="birth-time" />

          <div class="checkbox-row">
            <input type="checkbox" id="time-unknown" />
            <span>出生時間がわからない（12:00で計算）</span>
          </div>
        </label>

        <label>
          出生地
          <input type="text" id="birth-place" placeholder="例：東京, Japan" required />
        </label>

        <button type="submit" id="submit-btn">月と太陽をスキャンする</button>
      </form>

      <p id="status" class="status"></p>
    </section>

    <section class="card">
      <h2>結果</h2>
      <pre id="result" class="result">ここに結果が表示されます。</pre>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
